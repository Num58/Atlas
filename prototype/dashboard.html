<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PrimeAtlas · 数据仪表盘</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .dash-header {
      padding: var(--space-5);
    }

    .dash-title {
      font-size: var(--font-size-xl);
      font-weight: var(--font-weight-bold);
      margin-bottom: var(--space-1);
    }

    .dash-period {
      display: flex;
      gap: var(--space-2);
      margin-top: var(--space-3);
    }

    .period-tag {
      padding: var(--space-1) var(--space-3);
      background: var(--color-bg-card);
      border-radius: var(--radius-full);
      font-size: var(--font-size-sm);
      cursor: pointer;
      color: var(--color-text-secondary);
    }

    .period-tag.active {
      background: rgba(255,107,53,0.15);
      color: var(--color-accent-primary);
    }

    .dash-section {
      padding: 0 var(--space-5);
      margin-bottom: var(--space-6);
    }

    .dash-section-title {
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-secondary);
      margin-bottom: var(--space-3);
    }

    /* Stat Grid */
    .dash-stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
    }

    .dash-stat-card {
      padding: var(--space-4);
      background: var(--color-bg-card);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .dash-stat-value {
      font-size: var(--font-size-2xl);
      font-weight: var(--font-weight-bold);
    }

    .dash-stat-label {
      font-size: var(--font-size-xs);
      color: var(--color-text-tertiary);
      margin-top: var(--space-1);
    }

    .dash-stat-trend {
      font-size: var(--font-size-xs);
      margin-top: var(--space-1);
    }

    /* Chart Placeholder */
    .dash-chart {
      width: 100%;
      height: 160px;
      background: var(--color-bg-card);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: flex-end;
      justify-content: space-around;
      padding: var(--space-4) var(--space-3);
      gap: var(--space-2);
    }

    .chart-bar {
      flex: 1;
      background: linear-gradient(to top, var(--color-accent-primary), var(--color-accent-secondary));
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      min-height: 4px;
      transition: height var(--duration-slow) var(--ease-out);
      position: relative;
    }

    .chart-bar .bar-label {
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      color: var(--color-text-tertiary);
    }

    /* PR List */
    .pr-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .pr-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: var(--color-bg-card);
      border-radius: var(--radius-md);
      border: 1px solid rgba(74,222,128,0.15);
    }

    .pr-item .pr-icon {
      font-size: 24px;
    }

    .pr-item .pr-info {
      flex: 1;
    }

    .pr-item .pr-name {
      font-weight: var(--font-weight-semibold);
      font-size: var(--font-size-sm);
    }

    .pr-item .pr-detail {
      font-size: var(--font-size-xs);
      color: var(--color-text-tertiary);
    }

    .pr-item .pr-value {
      font-weight: var(--font-weight-bold);
      color: var(--color-success);
      font-size: var(--font-size-md);
    }

    /* Body Trends */
    .body-trends {
      display: flex;
      gap: var(--space-3);
    }

    .body-trend-item {
      flex: 1;
      padding: var(--space-4);
      background: var(--color-bg-card);
      border-radius: var(--radius-lg);
      text-align: center;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .body-trend-value {
      font-size: var(--font-size-lg);
      font-weight: var(--font-weight-bold);
    }

    .body-trend-label {
      font-size: var(--font-size-xs);
      color: var(--color-text-tertiary);
    }

    .body-trend-change {
      font-size: var(--font-size-xs);
      margin-top: var(--space-1);
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="page-content">
      <div class="dash-header">
        <h1 class="dash-title">数据仪表盘</h1>
        <div class="dash-period">
          <div class="period-tag active" onclick="switchPeriod(this)">本周</div>
          <div class="period-tag" onclick="switchPeriod(this)">本月</div>
          <div class="period-tag" onclick="switchPeriod(this)">本年</div>
        </div>
      </div>

      <!-- Overview Stats -->
      <div class="dash-section">
        <div class="dash-section-title">训练概览</div>
        <div class="dash-stat-grid">
          <div class="dash-stat-card">
            <div class="dash-stat-value">4</div>
            <div class="dash-stat-label">本周训练次数</div>
            <div class="dash-stat-trend text-success">↑ 1 次 vs 上周</div>
          </div>
          <div class="dash-stat-card">
            <div class="dash-stat-value text-accent">12,450</div>
            <div class="dash-stat-label">总容量 (kg)</div>
            <div class="dash-stat-trend text-success">↑ 8%</div>
          </div>
          <div class="dash-stat-card">
            <div class="dash-stat-value">1,520</div>
            <div class="dash-stat-label">消耗热量 (kcal)</div>
            <div class="dash-stat-trend text-success">↑ 5%</div>
          </div>
          <div class="dash-stat-card">
            <div class="dash-stat-value">3</div>
            <div class="dash-stat-label">🏆 本周 PR</div>
            <div class="dash-stat-trend text-success">新高!</div>
          </div>
        </div>
      </div>

      <!-- Volume Chart -->
      <div class="dash-section">
        <div class="dash-section-title">训练容量趋势</div>
        <div class="dash-chart">
          <div class="chart-bar" style="height:60%"><div class="bar-label">一</div></div>
          <div class="chart-bar" style="height:45%"><div class="bar-label">二</div></div>
          <div class="chart-bar" style="height:80%"><div class="bar-label">三</div></div>
          <div class="chart-bar" style="height:55%"><div class="bar-label">四</div></div>
          <div class="chart-bar" style="height:90%"><div class="bar-label">五</div></div>
          <div class="chart-bar" style="height:40%"><div class="bar-label">六</div></div>
          <div class="chart-bar" style="height:70%"><div class="bar-label">日</div></div>
        </div>
      </div>

      <!-- Personal Records -->
      <div class="dash-section">
        <div class="dash-section-title">个人纪录 (PR)</div>
        <div class="pr-list">
          <div class="pr-item">
            <div class="pr-icon">🏆</div>
            <div class="pr-info">
              <div class="pr-name">卧推 1RM</div>
              <div class="pr-detail">2024.7.2 创造</div>
            </div>
            <div class="pr-value">92.5kg</div>
          </div>
          <div class="pr-item">
            <div class="pr-icon">⭐</div>
            <div class="pr-info">
              <div class="pr-name">深蹲 1RM</div>
              <div class="pr-detail">2024.6.28 创造</div>
            </div>
            <div class="pr-value">130kg</div>
          </div>
          <div class="pr-item">
            <div class="pr-icon">🔥</div>
            <div class="pr-info">
              <div class="pr-name">引体向上最多次数</div>
              <div class="pr-detail">2024.6.25 创造</div>
            </div>
            <div class="pr-value">15 次</div>
          </div>
        </div>
      </div>

      <!-- Body Trends -->
      <div class="dash-section">
        <div class="dash-section-title">身体趋势</div>
        <div class="body-trends">
          <div class="body-trend-item">
            <div class="body-trend-value">72.5</div>
            <div class="body-trend-label">体重 (kg)</div>
            <div class="body-trend-change text-success">↓ 1.5kg</div>
          </div>
          <div class="body-trend-item">
            <div class="body-trend-value">16.5</div>
            <div class="body-trend-label">体脂率 (%)</div>
            <div class="body-trend-change text-success">↓ 0.5%</div>
          </div>
          <div class="body-trend-item">
            <div class="body-trend-value">68</div>
            <div class="body-trend-label">静息心率</div>
            <div class="body-trend-change text-success">↓ 2</div>
          </div>
        </div>
      </div>
    </div>

    <nav class="tab-bar">
      <a href="home.html" class="tab-item">
        <span class="tab-icon">🏠</span>
        <span>首页</span>
      </a>
      <a href="training-history.html" class="tab-item">
        <span class="tab-icon">🏋️</span>
        <span>训练</span>
      </a>
      <a href="profile.html" class="tab-item">
        <span class="tab-icon">👤</span>
        <span>我的</span>
      </a>
    </nav>
  </div>

  <script>
    function switchPeriod(el) {
      document.querySelectorAll('.period-tag').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
    }
  </script>
</body>
</html>
