<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>数据 — PrimeAtlas</title><link rel="stylesheet" href="shared.css"><style>
  .dash{padding:var(--space-lg);padding-bottom:120px}
  .hero-stat{text-align:center;padding:var(--space-xl) 0}
  .hero-num{font-size:64px;font-weight:700;font-family:var(--font-data);background:linear-gradient(135deg,var(--color-primary),var(--color-gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .hero-label{font-size:var(--text-sm);color:var(--text-secondary);margin-top:4px}
  .stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:var(--space-md);margin:var(--space-lg) 0}
  .stat-card{background:var(--bg-card);border-radius:var(--radius-lg);padding:var(--space-md);text-align:center}
  .stat-val{font-size:var(--text-xl);font-weight:700;font-family:var(--font-data)}
  .stat-lbl{font-size:var(--text-xs);color:var(--text-tertiary);margin-top:2px}
  .pr-item{display:flex;justify-content:space-between;padding:var(--space-md);background:var(--bg-card);border-radius:var(--radius-md);margin-bottom:var(--space-sm)}
  .pr-name{font-size:var(--text-md);font-weight:600}
  .pr-val{font-size:var(--text-md);font-weight:700;color:var(--color-gold)}
</style></head><body><div class="app"><div class="dash">
  <div class="page-header"><div class="page-title">📊 数据仪表盘</div></div>
  <div class="hero-stat"><div class="hero-num">742</div><div class="hero-label">成长指数 · 较上月 ↑ +8</div></div>
  <div class="stat-row">
    <div class="stat-card"><div class="stat-val" style="color:var(--color-primary)">52</div><div class="stat-lbl">总训练次数</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--color-gold)">18,400</div><div class="stat-lbl">周总容量 kg</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--color-success)">+8%</div><div class="stat-lbl">较上周增长</div></div>
  </div>
  <div style="font-size:var(--text-md);font-weight:600;margin:var(--space-lg) 0 var(--space-md)">🏆 个人纪录</div>
  <div class="pr-item"><span class="pr-name">杠铃深蹲</span><span class="pr-val">95kg × 5</span></div>
  <div class="pr-item"><span class="pr-name">杠铃卧推</span><span class="pr-val">75kg × 8</span></div>
  <div class="pr-item"><span class="pr-name">杠铃硬拉</span><span class="pr-val">120kg × 3</span></div>
</div>
<div class="tab-bar"><a href="home.html" class="tab-item"><span class="tab-icon">🏠</span>首页</a><a href="training-history.html" class="tab-item"><span class="tab-icon">🏋️</span>训练</a><a href="profile.html" class="tab-item"><span class="tab-icon">👤</span>我的</a></div>
</div></body></html>
