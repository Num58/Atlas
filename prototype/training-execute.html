<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>训练执行 — PrimeAtlas</title>
  <style>
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    .container { max-width: 414px; margin: 0 auto; min-height: 100vh; position: relative; }

    /* Top bar */
    .top-bar { padding: 16px; display: flex; align-items: center; justify-content: space-between; }
    .top-info { display: flex; align-items: center; gap: 8px; }
    .top-exercise { font-size: 15px; font-weight: 600; }
    .top-sets { font-size: 13px; color: var(--text-secondary); }
    .top-partner {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, #FF4500, var(--color-primary));
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; cursor: pointer;
      animation: partnerPulse 3s ease-in-out infinite;
      position: relative;
    }
    @keyframes partnerPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
    .top-partner-speech {
      position: absolute; top: -40px; right: 0; background: var(--bg-card);
      padding: 6px 12px; border-radius: var(--radius-md); font-size: 11px;
      color: var(--text-secondary); white-space: nowrap;
      animation: speechFloat 2s ease-in-out infinite;
    }
    @keyframes speechFloat { 0%,100%{transform:translateY(0);opacity:1} 50%{transform:translateY(-3px);opacity:0.8} }

    /* Progress dots */
    .set-progress { display: flex; justify-content: center; gap: 8px; padding: 0 16px 20px; }
    .set-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--bg-divider); transition: all 0.3s var(--ease-out); }
    .set-dot.done { background: var(--color-success); }
    .set-dot.current { background: var(--color-primary); transform: scale(1.3); animation: dotPulse 1s ease-in-out infinite; }
    @keyframes dotPulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,92,0,0.4)} 50%{box-shadow:0 0 0 8px rgba(255,92,0,0)} }

    /* Exercise info */
    .exercise-info { padding: 0 24px; text-align: center; margin-bottom: 24px; }
    .exercise-name { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .exercise-target { font-size: 15px; color: var(--text-secondary); }
    .exercise-history {
      margin-top: 12px; display: flex; gap: 16px; justify-content: center;
      font-size: 12px; color: var(--text-tertiary);
    }

    /* Exercise visual */
    .exercise-visual {
      margin: 0 24px 32px; background: var(--bg-card);
      border-radius: var(--radius-xl); height: 180px;
      display: flex; align-items: center; justify-content: center;
      font-size: 72px; position: relative; overflow: hidden;
    }
    .exercise-visual::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at center, rgba(255, 92, 0, 0.05), transparent 70%);
    }

    /* Countdown overlay */
    .countdown-overlay {
      position: fixed; inset: 0; background: rgba(26, 26, 46, 0.9);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none;
      transition: opacity 0.3s var(--ease-out);
    }
    .countdown-overlay.active { opacity: 1; }
    .countdown-number {
      font-size: 80px; font-weight: 900; color: var(--color-primary);
      text-shadow: 0 0 60px rgba(255, 92, 0, 0.5);
      animation: countBounce 0.8s var(--spring) forwards;
      line-height: 1;
    }
    .countdown-number.go { color: var(--color-gold); text-shadow: 0 0 80px rgba(255, 215, 0, 0.6); }
    @keyframes countBounce {
      0% { transform: scale(1.5); opacity: 0; }
      30% { transform: scale(0.9); opacity: 1; }
      60% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 0; }
    }

    /* Timer */
    .timer-area { text-align: center; margin-bottom: 24px; }
    .timer-display { font-size: 56px; font-weight: 900; font-variant-numeric: tabular-nums; letter-spacing: 2px; }
    .timer-display.running { color: var(--color-primary); }
    .timer-label { font-size: 13px; color: var(--text-tertiary); margin-top: 4px; }

    /* Action button */
    .action-area { padding: 0 24px; text-align: center; }
    .btn-action {
      width: 100%; padding: 24px; border: none; border-radius: var(--radius-xl);
      font-size: 22px; font-weight: 800; cursor: pointer;
      transition: all 0.15s var(--spring);
      color: #fff; background: var(--color-primary);
      box-shadow: 0 4px 24px rgba(255, 92, 0, 0.3);
    }
    .btn-action:active { transform: scale(0.93); }
    .btn-action.set-complete { background: var(--color-success); box-shadow: 0 4px 24px rgba(0, 210, 160, 0.3); }
    .btn-action.last-set { background: var(--color-danger); box-shadow: 0 4px 24px rgba(255, 59, 59, 0.3); animation: lastSetGlow 0.8s ease-in-out infinite; }
    @keyframes lastSetGlow { 0%,100%{box-shadow:0 4px 24px rgba(255,59,59,0.3)} 50%{box-shadow:0 4px 40px rgba(255,59,59,0.6)} }

    /* Form tips */
    .form-tips { padding: 16px 24px; margin-top: 16px; }
    .form-tip {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--text-tertiary); margin-bottom: 6px;
    }
    .form-tip-icon { font-size: 14px; }

    /* Last set banner */
    .last-set-banner {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      background: linear-gradient(135deg, var(--color-danger), var(--color-primary));
      padding: 12px 24px; text-align: center;
      font-size: 16px; font-weight: 800; color: #fff;
      transform: translateY(-100%); transition: transform 0.4s var(--spring);
      box-shadow: 0 4px 20px rgba(255, 59, 59, 0.4);
    }
    .last-set-banner.active { transform: translateY(0); }

    /* Flame particles */
    .flame-particle {
      position: fixed; pointer-events: none; z-index: 49;
      font-size: 24px; animation: flameRise 2s ease-out forwards;
    }
    @keyframes flameRise {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-200px) scale(0.3); }
    }

    /* Partner popup */
    .partner-popup {
      position: fixed; bottom: 160px; left: 50%; transform: translateX(-50%);
      background: var(--bg-card); padding: 10px 16px;
      border-radius: var(--radius-lg); font-size: 13px;
      color: var(--text-secondary); z-index: 30;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s var(--ease-out);
      max-width: 280px; text-align: center;
    }
    .partner-popup.active { opacity: 1; }

    /* Nav */
    .nav-back { display: inline-flex; align-items: center; gap: 4px; color: var(--text-tertiary); text-decoration: none; font-size: 12px; padding: 4px 16px; position: absolute; left: 0; z-index: 10; }
  </style>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="container">

  <a href="index.html" class="nav-back">← 返回</a>

  <!-- Last Set Banner -->
  <div class="last-set-banner" id="lastSetBanner">🔥 LAST SET — 最后一组，全力以赴！</div>

  <!-- Countdown Overlay -->
  <div class="countdown-overlay" id="countdownOverlay">
    <div class="countdown-number" id="countdownNumber">3</div>
  </div>

  <!-- Top Bar -->
  <div class="top-bar" style="padding-top:32px;">
    <div class="top-info">
      <span class="top-exercise">杠铃深蹲</span>
      <span class="top-sets">第 3/5 组</span>
    </div>
    <div class="top-partner" onclick="togglePartnerPopup()">
      🔥
      <div class="top-partner-speech">稳一点，核心收紧！</div>
    </div>
  </div>

  <!-- Set Progress -->
  <div class="set-progress" id="setProgress">
    <div class="set-dot done"></div>
    <div class="set-dot done"></div>
    <div class="set-dot current"></div>
    <div class="set-dot"></div>
    <div class="set-dot"></div>
  </div>

  <!-- Exercise Info -->
  <div class="exercise-info">
    <div class="exercise-name">杠铃深蹲</div>
    <div class="exercise-target">目标：85kg × 5 reps · RPE 8</div>
    <div class="exercise-history">
      <span>上次：80kg × 5</span>
      <span>历史最佳：90kg × 3</span>
    </div>
  </div>

  <!-- Exercise Visual -->
  <div class="exercise-visual">🏋️</div>

  <!-- Timer -->
  <div class="timer-area">
    <div class="timer-display" id="timerDisplay">00:00</div>
    <div class="timer-label" id="timerLabel">点击下方按钮开始</div>
  </div>

  <!-- Action -->
  <div class="action-area">
    <button class="btn-action" id="actionBtn" onclick="startCountdown()">
      开始一组
    </button>
  </div>

  <!-- Form Tips -->
  <div class="form-tips">
    <div class="form-tip"><span class="form-tip-icon">📍</span> 双脚与肩同宽，脚尖微微外展</div>
    <div class="form-tip"><span class="form-tip-icon">📍</span> 核心收紧，保持脊柱中立</div>
    <div class="form-tip"><span class="form-tip-icon">📍</span> 下蹲至大腿与地面平行</div>
  </div>

  <!-- Partner Popup -->
  <div class="partner-popup" id="partnerPopup">
    Alex: "稳住节奏，第 3 组是你的舒适区，把动作做标准。"
  </div>

</div>

<script>
let currentSet = 3;
const totalSets = 5;
let timerInterval = null;
let timerSeconds = 0;
let isLastSet = (currentSet === totalSets);
let countdownActive = false;

function togglePartnerPopup() {
  const popup = document.getElementById('partnerPopup');
  popup.classList.toggle('active');
  if (popup.classList.contains('active')) {
    setTimeout(() => popup.classList.remove('active'), 3000);
  }
}

function spawnFlameParticles() {
  for (let i = 0; i < 30; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'flame-particle';
      p.style.cssText = `
        left: ${10 + Math.random() * 80}%;
        top: ${60 + Math.random() * 20}%;
        animation-delay: ${Math.random() * 0.3}s;
        animation-duration: ${1.5 + Math.random() * 1}s;
      `;
      p.textContent = ['🔥','✨','💥','⚡'][Math.floor(Math.random()*4)];
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 2500);
    }, i * 20);
  }
}

function startCountdown() {
  if (countdownActive) return;
  countdownActive = true;

  const overlay = document.getElementById('countdownOverlay');
  const number = document.getElementById('countdownNumber');
  const btn = document.getElementById('actionBtn');

  overlay.classList.add('active');

  let count = 3;
  function showCount() {
    if (count > 0) {
      number.textContent = count;
      number.className = 'countdown-number';
      number.style.animation = 'none';
      void number.offsetWidth;
      number.style.animation = 'countBounce 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards';
      count--;
      setTimeout(showCount, 800);
    } else {
      number.textContent = 'GO!';
      number.className = 'countdown-number go';
      number.style.animation = 'none';
      void number.offsetWidth;
      number.style.animation = 'countBounce 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards';

      // Brief pause after GO! for user readiness
      setTimeout(() => {
        overlay.classList.remove('active');
        startTimer();
        btn.textContent = '完成一组 ✓';
        btn.classList.add('set-complete');
        countdownActive = false;
      }, 900); // Extended from 800ms for readiness pause
    }
  }
  showCount();
}

function startTimer() {
  timerSeconds = 0;
  const display = document.getElementById('timerDisplay');
  const label = document.getElementById('timerLabel');
  display.classList.add('running');
  label.textContent = '训练中...';

  timerInterval = setInterval(() => {
    timerSeconds++;
    const m = Math.floor(timerSeconds / 60);
    const s = timerSeconds % 60;
    display.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  }, 1000);

  document.getElementById('actionBtn').onclick = completeSet;
}

function completeSet() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }

  const display = document.getElementById('timerDisplay');
  display.classList.remove('running');
  document.getElementById('timerLabel').textContent = '组间休息';

  // Check if last set
  if (currentSet === totalSets) {
    // Show last set celebration
    const banner = document.getElementById('lastSetBanner');
    banner.classList.add('active');
    spawnFlameParticles();
    setTimeout(() => banner.classList.remove('active'), 3000);

    const btn = document.getElementById('actionBtn');
    btn.classList.add('last-set');
    btn.textContent = 'LAST SET 完成 🔥';
    btn.onclick = null;

    // Navigate to rest/summary after delay
    setTimeout(() => {
      window.location.href = 'training-rest.html?lastSet=true';
    }, 2000);
  } else {
    // Navigate to rest view
    window.location.href = 'training-rest.html?set=' + currentSet + '&total=' + totalSets;
  }
}

// Show last set banner on load if applicable
if (isLastSet) {
  setTimeout(() => {
    document.getElementById('actionBtn').style.background = 'var(--color-danger)';
    document.getElementById('actionBtn').textContent = '最后一组 — 全力以赴 🔥';
  }, 500);
}
</script>
</body>
</html>
