<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PR 突破 — PrimeAtlas</title>
  <style>
    :root {
      --bg-primary: #1A1A2E;
      --text-primary: #FFFFFF;
      --text-secondary: #B0B0CC;
      --color-primary: #FF5C00;
      --color-gold: #FFD700;
      --color-danger: #FF3B3B;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --ease-out: cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
      height: 100vh;
    }
    .container { max-width: 414px; margin: 0 auto; height: 100vh; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }

    /* Particle canvas */
    #particleCanvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

    /* Content */
    .content { position: relative; z-index: 10; text-align: center; padding: 24px; width: 100%; }

    .pr-badge { font-size: 14px; color: var(--color-gold); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 16px; animation: fadeInDown 0.6s var(--spring); }
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

    .pr-emoji { font-size: 80px; animation: prBounce 0.6s var(--spring) 0.3s both; }
    @keyframes prBounce { from { opacity: 0; transform: scale(0) rotate(-20deg); } to { opacity: 1; transform: scale(1) rotate(0); } }

    .pr-title { font-size: 36px; font-weight: 900; margin: 16px 0 8px; animation: fadeInUp 0.6s var(--spring) 0.5s both; background: linear-gradient(135deg, var(--color-gold), var(--color-primary), var(--color-danger)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .pr-value { font-size: 72px; font-weight: 900; color: var(--color-gold); text-shadow: 0 0 40px rgba(255, 215, 0, 0.4); animation: prScale 0.8s var(--spring) 0.8s both; }
    @keyframes prScale { from { opacity: 0; transform: scale(0.3); } to { opacity: 1; transform: scale(1); } }

    .pr-exercise { font-size: 18px; color: var(--text-secondary); margin-top: 8px; animation: fadeInUp 0.6s var(--spring) 1s both; }

    .pr-detail { font-size: 14px; color: var(--text-secondary); margin-top: 8px; animation: fadeInUp 0.6s var(--spring) 1.1s both; }

    .pr-compare { display: flex; justify-content: center; gap: 24px; margin-top: 24px; animation: fadeInUp 0.6s var(--spring) 1.3s both; }
    .pr-compare-item { text-align: center; }
    .pr-compare-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
    .pr-compare-old { font-size: 20px; color: var(--text-secondary); text-decoration: line-through; }
    .pr-compare-new { font-size: 28px; font-weight: 700; color: var(--color-gold); }

    .pr-arrow { font-size: 24px; color: var(--color-primary); align-self: center; }

    /* Partner message */
    .partner-msg {
      margin-top: 24px; padding: 16px 20px; background: rgba(255, 215, 0, 0.08);
      border: 1px solid rgba(255, 215, 0, 0.2); border-radius: var(--radius-lg);
      display: flex; gap: 10px; align-items: flex-start;
      animation: fadeInUp 0.6s var(--spring) 1.5s both;
    }
    .partner-msg-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #FF4500, var(--color-primary)); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .partner-msg-text { font-size: 14px; color: var(--text-secondary); line-height: 1.6; text-align: left; }
    .partner-msg-text strong { color: var(--color-gold); }

    /* Actions */
    .actions { margin-top: 32px; display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px; animation: fadeInUp 0.6s var(--spring) 1.8s both; }
    .btn {
      padding: 16px; border: none; border-radius: var(--radius-lg);
      font-size: 16px; font-weight: 700; cursor: pointer;
      transition: transform 0.15s var(--spring);
      text-decoration: none; text-align: center; display: block;
    }
    .btn:active { transform: scale(0.95); }
    .btn-primary { background: var(--color-gold); color: #1A1A2E; }
    .btn-secondary { background: transparent; color: var(--text-secondary); border: 1px solid var(--bg-divider, #2A2A4A); }
    .btn-share { background: rgba(255, 215, 0, 0.1); color: var(--color-gold); border: 1px solid rgba(255, 215, 0, 0.3); }

    /* Share card styles */
    .share-card {
      position: fixed; inset: 0; background: rgba(0,0,0,0.9);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none;
      transition: opacity 0.3s var(--ease-out);
    }
    .share-card.active { opacity: 1; pointer-events: auto; }
    .share-card-inner {
      background: var(--bg-primary); border-radius: var(--radius-xl);
      padding: 32px; text-align: center; max-width: 320px;
      border: 2px solid var(--color-gold);
      animation: scaleIn 0.4s var(--spring);
    }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    .share-card-close { margin-top: 16px; font-size: 14px; color: var(--text-tertiary); cursor: pointer; }
  </style>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="container">

  <canvas id="particleCanvas"></canvas>

  <div class="content">
    <div class="pr-badge">🏆 NEW PERSONAL RECORD</div>
    <div class="pr-emoji">🏆</div>
    <div class="pr-title">深蹲 PR 突破！</div>
    <div class="pr-value">90kg × 5</div>
    <div class="pr-exercise">杠铃深蹲</div>
    <div class="pr-detail">第 5 组 · RPE 9</div>

    <div class="pr-compare">
      <div class="pr-compare-item">
        <div class="pr-compare-label">之前最佳</div>
        <div class="pr-compare-old">85kg × 5</div>
      </div>
      <div class="pr-arrow">→</div>
      <div class="pr-compare-item">
        <div class="pr-compare-label">新纪录</div>
        <div class="pr-compare-new">90kg × 5</div>
      </div>
    </div>

    <div class="partner-msg">
      <div class="partner-msg-avatar">🔥</div>
      <div class="partner-msg-text">
        <strong>Alex：</strong>"我就知道你能做到！<br>90公斤，5次，动作还这么标准。<br>这是你应得的——记住这个感觉。"
      </div>
    </div>

    <div class="actions">
      <a href="training-summary.html" class="btn btn-primary">查看训练总结 →</a>
      <button class="btn btn-share" onclick="showShareCard()">📤 分享成就卡片</button>
      <a href="training-home.html" class="btn btn-secondary">返回训练首页</a>
    </div>
  </div>

  <!-- Share Card -->
  <div class="share-card" id="shareCard" onclick="hideShareCard()">
    <div class="share-card-inner" onclick="event.stopPropagation()">
      <div style="font-size:48px;">🏆</div>
      <div style="font-size:14px;color:var(--color-gold);margin:8px 0;">PRIMEATLAS · PERSONAL RECORD</div>
      <div style="font-size:48px;font-weight:900;color:var(--color-gold);margin:12px 0;">90kg × 5</div>
      <div style="font-size:18px;">杠铃深蹲</div>
      <div style="font-size:13px;color:var(--text-secondary);margin:8px 0;">突破 +5.9% | 连续训练第 12 天</div>
      <div style="font-size:13px;color:var(--text-secondary);font-style:italic;margin-top:12px;">"我就知道你能做到！" — Alex·赤焰</div>
      <div class="share-card-close" onclick="hideShareCard()">关闭</div>
    </div>
  </div>

</div>

<script>
// Particle system
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const particles = [];
const colors = ['#FFD700', '#FF5C00', '#FF8C00', '#FF3B3B', '#FFA500'];

function createParticle(x, y) {
  return {
    x: x || canvas.width / 2 + (Math.random() - 0.5) * 200,
    y: y || canvas.height / 2 + (Math.random() - 0.5) * 100,
    vx: (Math.random() - 0.5) * 8,
    vy: (Math.random() - 0.5) * 8 - 4,
    size: 2 + Math.random() * 6,
    color: colors[Math.floor(Math.random() * colors.length)],
    life: 1,
    decay: 0.005 + Math.random() * 0.01
  };
}

// Initial burst
for (let i = 0; i < 150; i++) {
  particles.push(createParticle());
}

const MAX_PARTICLES = 200;

// Continuous spawn with cap
setInterval(() => {
  if (particles.length < MAX_PARTICLES) {
    const toSpawn = Math.min(5, MAX_PARTICLES - particles.length);
    for (let i = 0; i < toSpawn; i++) {
      particles.push(createParticle());
    }
  }
}, 200);

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.02;
    p.life -= p.decay;

    if (p.life <= 0) {
      particles.splice(i, 1);
      continue;
    }

    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();

    ctx.shadowColor = p.color;
    ctx.shadowBlur = 10;
    ctx.fill();
    ctx.restore();
  }

  requestAnimationFrame(animate);
}

function initCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  // Refill particles on resize
  while (particles.length < 50) {
    particles.push(createParticle());
  }
}

initCanvas();
animate();

window.addEventListener('resize', initCanvas);

function showShareCard() {
  document.getElementById('shareCard').classList.add('active');
}

function hideShareCard() {
  document.getElementById('shareCard').classList.remove('active');
}
</script>
</body>
</html>
