<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PrimeAtlas — 训练执行</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .session-container {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--color-bg);
    }
    /* 顶部状态栏 */
    .session-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-lg);
      flex-shrink: 0;
    }
    .session-phase {
      font-size: var(--font-size-caption);
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .session-progress {
      font-size: var(--font-size-caption);
      color: var(--color-text-secondary);
    }
    .session-exit {
      background: none;
      border: none;
      color: var(--color-text-muted);
      font-size: var(--font-size-body);
      cursor: pointer;
      min-width: var(--touch-min);
      min-height: var(--touch-min);
    }
    /* 大字核心区 */
    .session-core {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-2xl);
      text-align: center;
    }
    .exercise-name-display {
      font-size: 32px;
      font-weight: var(--font-weight-bold);
      color: var(--color-text);
      line-height: 1.2;
      margin-bottom: var(--space-sm);
    }
    .exercise-detail-display {
      font-size: var(--font-size-body);
      color: var(--color-text-secondary);
      margin-bottom: var(--space-2xl);
    }
    .timer-display {
      font-size: 80px;
      font-weight: var(--font-weight-bold);
      font-family: var(--font-mono);
      color: var(--color-text);
      line-height: 1;
      letter-spacing: -2px;
      margin-bottom: var(--space-lg);
    }
    .timer-display.resting {
      color: var(--color-accent);
    }
    .set-counter {
      font-size: var(--font-size-body-lg);
      color: var(--color-text-secondary);
      margin-bottom: var(--space-3xl);
    }
    .set-dot-row {
      display: flex;
      gap: var(--space-sm);
      justify-content: center;
      margin-bottom: var(--space-xl);
    }
    .set-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--color-bg-input);
    }
    .set-dot.done {
      background: var(--color-accent);
    }
    .set-dot.current {
      background: var(--color-primary);
      box-shadow: 0 0 8px rgba(124, 92, 252, 0.5);
    }
    /* 底部操作区 */
    .session-actions {
      padding: var(--space-xl) var(--space-lg);
      padding-bottom: calc(var(--space-3xl) + env(safe-area-inset-bottom, 8px));
      flex-shrink: 0;
    }
    /* 确认层 */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: var(--color-bg-overlay);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 200;
    }
    .confirm-sheet {
      background: var(--color-bg-card);
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      padding: var(--space-2xl);
      width: 100%;
      max-width: var(--viewport-max);
      animation: slideUp 0.3s ease;
    }
    .confirm-title {
      font-size: var(--font-size-subtitle);
      font-weight: var(--font-weight-bold);
      margin-bottom: var(--space-lg);
      text-align: center;
    }
    .confirm-data {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-md);
      margin-bottom: var(--space-xl);
      text-align: center;
    }
    .confirm-data-item {
      background: var(--color-bg-elevated);
      border-radius: var(--radius-md);
      padding: var(--space-md);
    }
    .confirm-data-value {
      font-size: var(--font-size-title);
      font-weight: var(--font-weight-bold);
    }
    .confirm-data-label {
      font-size: 10px;
      color: var(--color-text-muted);
    }
    /* 休息阶段 */
    .rest-buddy-msg {
      background: var(--color-bg-elevated);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      text-align: center;
      margin-top: var(--space-xl);
      border-top-left-radius: var(--radius-sm);
    }
    .rest-buddy-avatar {
      font-size: 36px;
      margin-bottom: var(--space-sm);
    }
    .rest-buddy-text {
      font-size: var(--font-size-body);
      color: var(--color-text-secondary);
      line-height: 1.6;
    }
    .next-preview {
      background: var(--color-bg-card);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      margin-top: var(--space-lg);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .next-preview-title {
      font-size: var(--font-size-caption);
      color: var(--color-text-muted);
      margin-bottom: var(--space-sm);
    }
    .next-preview-data {
      display: flex;
      justify-content: space-around;
      font-size: var(--font-size-body);
    }
    /* 完成阶段 */
    .completion-icon {
      font-size: 64px;
      margin-bottom: var(--space-lg);
      animation: scaleIn 0.5s ease;
    }
    .completion-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-md);
      width: 100%;
      max-width: 320px;
      margin: var(--space-xl) auto;
    }
    .completion-stat {
      text-align: center;
    }
    .completion-stat-value {
      font-size: var(--font-size-headline);
      font-weight: var(--font-weight-bold);
      color: var(--color-accent);
    }
    .completion-stat-label {
      font-size: var(--font-size-caption);
      color: var(--color-text-muted);
    }
  </style>
</head>
<body>
<div class="app-container">
<div class="session-container" id="sessionRoot">

  <!-- 头部 -->
  <div class="session-header">
    <button class="session-exit" onclick="exitSession()">✕</button>
    <span class="session-phase" id="phaseLabel">热身</span>
    <span class="session-progress" id="progressLabel">1/6</span>
  </div>

  <!-- 核心显示区 -->
  <div class="session-core" id="coreDisplay">
    <!-- 动态渲染 -->
  </div>

  <!-- 底部操作 -->
  <div class="session-actions" id="actionArea">
    <!-- 动态渲染 -->
  </div>

</div>

<!-- 确认层 -->
<div class="confirm-overlay" id="confirmOverlay" style="display:none;">
  <div class="confirm-sheet">
    <div class="confirm-title">确认完成</div>
    <div class="confirm-data" id="confirmData">
      <div class="confirm-data-item">
        <div class="confirm-data-value" id="confirmWeight">80kg</div>
        <div class="confirm-data-label">重量</div>
      </div>
      <div class="confirm-data-item">
        <div class="confirm-data-value" id="confirmReps">8</div>
        <div class="confirm-data-label">次数</div>
      </div>
      <div class="confirm-data-item">
        <div class="confirm-data-value" id="confirmRPE">7</div>
        <div class="confirm-data-label">RPE</div>
      </div>
    </div>
    <button class="btn btn-primary btn-block btn-lg" onclick="confirmSet()">
      ✓ 确认完成
    </button>
    <button class="btn btn-ghost btn-block mt-md" onclick="cancelConfirm()">
      取消
    </button>
  </div>
</div>
</div>

<script>
  // 训练数据
  const exercises = [
    { name: '空杠热身', detail: '热身 · 20kg', sets: 2, reps: 10, weight: '20kg', type: 'warmup' },
    { name: '杠铃深蹲', detail: '热身组 1', sets: 1, reps: 8, weight: '40kg', type: 'warmup' },
    { name: '杠铃深蹲', detail: '热身组 2', sets: 1, reps: 5, weight: '60kg', type: 'warmup' },
    { name: '杠铃深蹲', detail: '正式组', sets: 4, reps: 8, weight: '80kg', type: 'working' },
    { name: '罗马尼亚硬拉', detail: '正式组', sets: 3, reps: 10, weight: '60kg', type: 'working' },
    { name: '训练后拉伸', detail: '冷却', sets: 1, reps: 5, weight: '5分钟', type: 'cooldown' },
  ];

  let currentExercise = 0;
  let currentSet = 0;
  let phase = 'warmup'; // warmup | working | rest | cooldown | complete
  let restTimer = 90;
  let restInterval = null;
  let totalSetsDone = 0;
  let totalWeight = 0;

  function render() {
    const ex = exercises[currentExercise];
    const core = document.getElementById('coreDisplay');
    const actions = document.getElementById('actionArea');
    const phaseLabel = document.getElementById('phaseLabel');
    const progressLabel = document.getElementById('progressLabel');

    progressLabel.textContent = `${currentExercise + 1}/${exercises.length}`;

    if (phase === 'warmup' || phase === 'working') {
      phaseLabel.textContent = phase === 'warmup' ? '热身' : '训练';
      core.innerHTML = `
        <div class="exercise-name-display">${ex.name}</div>
        <div class="exercise-detail-display">${ex.detail} · ${ex.weight} × ${ex.reps}</div>
        <div class="set-counter">第 ${currentSet + 1}/${ex.sets} 组</div>
        <div class="set-dot-row">
          ${Array.from({length: ex.sets}, (_, i) =>
            `<span class="set-dot ${i < currentSet ? 'done' : i === currentSet ? 'current' : ''}"></span>`
          ).join('')}
        </div>
      `;

      // 热身/拉伸不自动推进
      if (ex.type === 'warmup' || ex.type === 'cooldown') {
        actions.innerHTML = `
          <button class="btn btn-primary btn-block btn-lg" onclick="completeSet()">
            完成 · 进入下一组
          </button>
          ${currentSet > 0 ? `<button class="btn btn-ghost btn-block mt-sm" onclick="skipSet()">跳过此组</button>` : ''}
        `;
      } else {
        actions.innerHTML = `
          <button class="btn btn-primary btn-block btn-lg" onclick="showConfirm()">
            完成 · 进入下一组
          </button>
        `;
      }

    } else if (phase === 'rest') {
      phaseLabel.textContent = '组间休息';
      const nextEx = currentSet >= ex.sets - 1 ? exercises[currentExercise + 1] : ex;
      const nextSetNum = currentSet >= ex.sets - 1 ? 0 : currentSet + 1;

      core.innerHTML = `
        <div style="font-size: var(--font-size-caption); color: var(--color-text-muted); margin-bottom: var(--space-sm);">
          组间休息
        </div>
        <div class="timer-display resting" id="restTimerDisplay">${formatTime(restTimer)}</div>
        <div class="set-counter">已完成 ${currentSet + 1}/${ex.sets} 组</div>
        ${nextEx ? `
        <div class="next-preview">
          <div class="next-preview-title">下一组预览</div>
          <div class="next-preview-data">
            <span>${nextEx.name}</span>
            <span>${nextEx.weight}</span>
            <span>×${nextEx.reps}</span>
          </div>
        </div>` : ''}
        <div class="rest-buddy-msg">
          <div class="rest-buddy-avatar">🦊</div>
          <div class="rest-buddy-text" id="buddyMsg">深呼吸，你做得很好！每一组都在变强。</div>
        </div>
      `;

      actions.innerHTML = `
        <button class="btn btn-secondary btn-block" onclick="skipRest()">
          跳过休息 · 继续训练
        </button>
        <button class="btn btn-ghost btn-block mt-sm" onclick="addRest()">
          +30秒
        </button>
      `;

      startRestTimer();

    } else if (phase === 'cooldown') {
      phaseLabel.textContent = '冷却';
      core.innerHTML = `
        <div class="exercise-name-display">${ex.name}</div>
        <div class="exercise-detail-display">${ex.detail} · ${ex.weight}</div>
        <div class="set-counter">最后一步</div>
        <div style="font-size: 48px; margin: var(--space-xl) 0;">🧘</div>
      `;
      actions.innerHTML = `
        <button class="btn btn-primary btn-block btn-lg" onclick="completeCooldown()">
          完成训练
        </button>
      `;

    } else if (phase === 'complete') {
      phaseLabel.textContent = '完成';
      core.innerHTML = `
        <div class="completion-icon">🎉</div>
        <div style="font-size: var(--font-size-headline); font-weight: var(--font-weight-bold); margin-bottom: var(--space-sm);">
          训练完成！
        </div>
        <div style="font-size: var(--font-size-body); color: var(--color-text-secondary);">
          今天又进步了一点
        </div>
        <div class="completion-stats">
          <div class="completion-stat">
            <div class="completion-stat-value">${totalSetsDone}</div>
            <div class="completion-stat-label">总组数</div>
          </div>
          <div class="completion-stat">
            <div class="completion-stat-value">${Math.floor(totalWeight/1000)}T</div>
            <div class="completion-stat-label">总吨位</div>
          </div>
          <div class="completion-stat">
            <div class="completion-stat-value">45'</div>
            <div class="completion-stat-label">训练时长</div>
          </div>
        </div>
        <div style="margin-top: var(--space-lg);">
          <span class="badge badge-done">深蹲完成 ✓</span>
        </div>
      `;
      actions.innerHTML = `
        <button class="btn btn-primary btn-block btn-lg" onclick="location.href='home.html'">
          返回首页
        </button>
        <button class="btn btn-ghost btn-block mt-sm" onclick="location.href='pr-celebration.html'">
          🎉 查看PR庆祝
        </button>
      `;
    }
  }

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${m}:${sec.toString().padStart(2, '0')}`;
  }

  function startRestTimer() {
    clearInterval(restInterval);
    restInterval = setInterval(() => {
      restTimer--;
      const display = document.getElementById('restTimerDisplay');
      if (display) display.textContent = formatTime(restTimer);
      if (restTimer <= 0) {
        clearInterval(restInterval);
        advanceAfterRest();
      }
    }, 1000);
  }

  function advanceAfterRest() {
    clearInterval(restInterval);
    const ex = exercises[currentExercise];
    currentSet++;
    if (currentSet >= ex.sets) {
      currentSet = 0;
      currentExercise++;
      if (currentExercise >= exercises.length) {
        phase = 'complete';
      } else {
        phase = exercises[currentExercise].type;
        restTimer = 90;
      }
    } else {
      phase = ex.type;
      restTimer = 90;
    }
    render();
  }

  function completeSet() {
    const ex = exercises[currentExercise];
    totalSetsDone++;
    totalWeight += parseInt(ex.weight) * ex.reps;
    currentSet++;

    if (currentSet >= ex.sets) {
      currentSet = 0;
      currentExercise++;
      if (currentExercise >= exercises.length) {
        phase = 'complete';
      } else {
        const next = exercises[currentExercise];
        if (next.type === 'cooldown') {
          phase = 'cooldown';
        } else if (next.type === 'warmup') {
          phase = 'warmup';
        } else {
          phase = 'rest';
          restTimer = 90;
        }
      }
    } else {
      if (ex.type === 'working') {
        phase = 'rest';
        restTimer = 90;
      }
    }
    render();
  }

  function showConfirm() {
    document.getElementById('confirmOverlay').style.display = 'flex';
    const ex = exercises[currentExercise];
    document.getElementById('confirmWeight').textContent = ex.weight;
    document.getElementById('confirmReps').textContent = ex.reps;
    document.getElementById('confirmRPE').textContent = '7';
  }

  function confirmSet() {
    document.getElementById('confirmOverlay').style.display = 'none';
    completeSet();
  }

  function cancelConfirm() {
    document.getElementById('confirmOverlay').style.display = 'none';
  }

  function skipSet() {
    currentSet++;
    if (currentSet >= exercises[currentExercise].sets) {
      currentSet = 0;
      currentExercise++;
      if (currentExercise >= exercises.length) {
        phase = 'complete';
      } else {
        phase = exercises[currentExercise].type;
      }
    }
    render();
  }

  function skipRest() {
    clearInterval(restInterval);
    advanceAfterRest();
  }

  function addRest() {
    restTimer += 30;
    const display = document.getElementById('restTimerDisplay');
    if (display) display.textContent = formatTime(restTimer);
  }

  function completeCooldown() {
    phase = 'complete';
    render();
  }

  function exitSession() {
    if (confirm('确定要退出训练吗？进度将丢失。')) {
      window.location.href = 'module-training.html';
    }
  }

  // 初始化
  phase = exercises[0].type;
  render();
</script>
</body>
</html>
