<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>首次启动 — PrimeAtlas</title><link rel="stylesheet" href="shared.css"><style>
  .onboard{padding:var(--space-xl);min-height:100vh;display:flex;flex-direction:column;justify-content:center}
  .step{text-align:center}
  .step-emoji{font-size:64px;margin-bottom:var(--space-lg)}
  .step-title{font-size:var(--text-2xl);font-weight:700;margin-bottom:var(--space-md)}
  .step-desc{font-size:var(--text-md);color:var(--text-secondary);margin-bottom:var(--space-xl);line-height:1.8}
  .options{display:flex;flex-direction:column;gap:var(--space-md);margin-bottom:var(--space-xl)}
  .option{width:100%;padding:16px;border-radius:var(--radius-lg);border:1px solid var(--bg-divider);background:var(--bg-card);color:var(--text-primary);font-size:var(--text-md);cursor:pointer;text-align:center}
  .option.selected{border-color:var(--color-primary);background:rgba(255,92,0,.1)}
  .partner-cards{display:flex;gap:var(--space-md);overflow-x:auto;padding-bottom:var(--space-md)}
  .pcard{flex-shrink:0;width:140px;padding:var(--space-lg);border-radius:var(--radius-xl);border:2px solid var(--bg-divider);background:var(--bg-card);text-align:center;cursor:pointer}
  .pcard.selected{border-color:var(--color-primary)}
  .pcard-face{font-size:40px;margin-bottom:var(--space-sm)}
  .pcard-name{font-size:var(--text-md);font-weight:700;margin-bottom:4px}
  .pcard-desc{font-size:var(--text-xs);color:var(--text-tertiary);line-height:1.4}
  .skip-link{text-align:center;margin-top:var(--space-lg);color:var(--text-tertiary);font-size:var(--text-sm);cursor:pointer}
</style></head><body><div class="app"><div class="onboard">
  <!-- Step 1: 伙伴召唤 -->
  <div id="s1" class="step">
    <div class="step-emoji">🤝</div><div class="step-title">召唤你的训练伙伴</div><div class="step-desc">每个人都有一个等待被唤醒的训练伙伴。<br>你的伙伴是谁？</div>
    <div class="partner-cards" id="partnerCards">
      <div class="pcard" onclick="selectPartner(this,'Alex','🔥')"><div class="pcard-face">🔥</div><div class="pcard-name">Alex·赤焰</div><div class="pcard-desc">前特种部队体能教官<br>"痛苦是暂时的，荣耀是永远的"</div></div>
      <div class="pcard" onclick="selectPartner(this,'小野','⚡')"><div class="pcard-face">⚡</div><div class="pcard-name">小野·疾风</div><div class="pcard-desc">街头篮球出身<br>"别想太多，干就完了"</div></div>
      <div class="pcard" onclick="selectPartner(this,'Elena','🌟')"><div class="pcard-face">🌟</div><div class="pcard-name">Elena·晨曦</div><div class="pcard-desc">运动科学博士<br>"你的身体比你以为的更强大"</div></div>
    </div>
    <button class="btn btn-primary btn-block btn-lg" onclick="next(2)">选择伙伴</button>
    <div class="skip-link" onclick="next(2)">先跳过，90秒快速体验 →</div>
  </div>
  <!-- Step 2: 目标 -->
  <div id="s2" class="step hidden"><div class="step-emoji">🎯</div><div class="step-title">你的目标是什么？</div><div class="options">
    <div class="option selected" onclick="selectGoal(this)">🏀 篮球弹跳 / 扣篮</div>
    <div class="option" onclick="selectGoal(this)">🏸 羽毛球专项</div>
    <div class="option" onclick="selectGoal(this)">💪 增肌</div>
    <div class="option" onclick="selectGoal(this)">🔥 减脂</div>
    <div class="option" onclick="selectGoal(this)">🧘 产后康复</div>
  </div><button class="btn btn-primary btn-block btn-lg" onclick="next(3)">继续</button></div>
  <!-- Step 3: 完成 -->
  <div id="s3" class="step hidden"><div class="step-emoji">🤝</div><div class="step-title">契约已成！</div><div class="step-desc">从今天起，你不再是一个人训练。<br>Alex 会陪你变强。</div>
  <a href="home.html" class="btn btn-primary btn-block btn-lg" style="text-decoration:none">进入 PrimeAtlas</a></div>
</div></div>
<script>
function selectPartner(el,name,emoji){document.querySelectorAll('.pcard').forEach(c=>c.classList.remove('selected'));el.classList.add('selected')}
function selectGoal(el){document.querySelectorAll('#s2 .option').forEach(o=>o.classList.remove('selected'));el.classList.add('selected')}
function next(n){document.querySelectorAll('.step').forEach(s=>s.classList.add('hidden'));document.getElementById('s'+n).classList.remove('hidden')}
</script></body></html>
