<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="elenaBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F0C0D0"/>
      <stop offset="100%" stop-color="#D4889A"/>
    </radialGradient>
    <radialGradient id="elenaHair" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#DAA520"/>
    </radialGradient>
    <linearGradient id="glassShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.5)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.1)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="elenaGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景圆 -->
  <circle cx="100" cy="100" r="95" fill="url(#elenaBg)" opacity="0.9"/>

  <!-- 光晕装饰 -->
  <ellipse cx="100" cy="100" rx="85" ry="85" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.25"/>
  <ellipse cx="100" cy="100" rx="75" ry="75" fill="none" stroke="#FFC0CB" stroke-width="1.5" opacity="0.2"/>

  <!-- 星光粒子容器 -->
  <g opacity="0">
    <circle cx="40" cy="40" r="3" fill="#FFD700">
      <animate attributeName="opacity" dur="2s" repeatCount="indefinite" values="0;1;0"/>
    </circle>
    <circle cx="155" cy="35" r="2" fill="#FFD700">
      <animate attributeName="opacity" dur="2.5s" repeatCount="indefinite" values="0;1;0"/>
    </circle>
    <circle cx="30" cy="130" r="2.5" fill="#FFD700">
      <animate attributeName="opacity" dur="1.8s" repeatCount="indefinite" values="0;1;0"/>
    </circle>
    <circle cx="160" cy="140" r="2" fill="#FFD700">
      <animate attributeName="opacity" dur="2.2s" repeatCount="indefinite" values="0;1;0"/>
    </circle>
    <circle cx="100" cy="15" r="3" fill="#FFFACD">
      <animate attributeName="opacity" dur="3s" repeatCount="indefinite" values="0;1;0"/>
    </circle>
  </g>

  <!-- 头发 — 柔和波浪 -->
  <path d="M52,80 Q50,55 60,42 Q65,35 80,32 Q95,28 100,28 Q105,28 120,32 Q135,35 140,42 Q150,55 148,80" fill="url(#elenaHair)" stroke="#DAA520" stroke-width="1.5"/>
  <path d="M52,80 Q48,100 50,120 Q52,140 55,148" fill="none" stroke="#DAA520" stroke-width="3" stroke-linecap="round"/>
  <path d="M148,80 Q152,100 150,120 Q148,140 145,148" fill="none" stroke="#DAA520" stroke-width="3" stroke-linecap="round"/>

  <!-- 脸部轮廓 — 柔和圆润 -->
  <path d="M100,55 C128,55 145,70 145,92 C145,118 130,140 100,142 C70,140 55,118 55,92 C55,70 72,55 100,55Z" fill="#FFE4D6" stroke="#E8B8B8" stroke-width="1.5"/>

  <!-- 眼镜 -->
  <circle cx="78" cy="86" r="14" fill="none" stroke="#8B7355" stroke-width="2.5"/>
  <circle cx="122" cy="86" r="14" fill="none" stroke="#8B7355" stroke-width="2.5"/>
  <line x1="92" y1="86" x2="108" y2="86" stroke="#8B7355" stroke-width="2"/>
  <line x1="64" y1="82" x2="60" y2="78" stroke="#8B7355" stroke-width="2"/>
  <line x1="136" y1="82" x2="140" y2="78" stroke="#8B7355" stroke-width="2"/>

  <!-- 镜片反光 -->
  <path d="M68,78 L82,80 L78,94 L64,92Z" fill="url(#glassShine)" opacity="0.6">
    <animate attributeName="opacity" dur="4s" repeatCount="indefinite" values="0.6;0.3;0.6"/>
  </path>
  <path d="M112,80 L126,78 L122,92 L108,94Z" fill="url(#glassShine)" opacity="0.5">
    <animate attributeName="opacity" dur="4.5s" repeatCount="indefinite" values="0.5;0.2;0.5"/>
  </path>

  <!-- 眼睛 — 温柔 -->
  <ellipse cx="78" cy="86" rx="5" ry="5.5" fill="#4A2800"/>
  <ellipse cx="122" cy="86" rx="5" ry="5.5" fill="#4A2800"/>
  <circle cx="76" cy="84" r="1.8" fill="white"/>
  <circle cx="120" cy="84" r="1.8" fill="white"/>

  <!-- 嘴 — 温暖微笑 -->
  <path d="M88,110 Q100,120 112,110" fill="none" stroke="#D4889A" stroke-width="2" stroke-linecap="round"/>

  <!-- 脸颊红晕 -->
  <ellipse cx="66" cy="98" rx="9" ry="5" fill="#FFB6C1" opacity="0.4"/>
  <ellipse cx="134" cy="98" rx="9" ry="5" fill="#FFB6C1" opacity="0.4"/>

  <!-- 发饰 -->
  <circle cx="145" cy="70" r="5" fill="#FFD700" opacity="0.7" filter="url(#elenaGlow)"/>
</svg>
