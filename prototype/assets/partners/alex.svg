<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="alexBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#CC2222"/>
    </radialGradient>
    <radialGradient id="alexEye" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </radialGradient>
    <filter id="alexGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="alexFlame" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FF4444"/>
      <stop offset="50%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
  </defs>

  <!-- 背景圆 -->
  <circle cx="100" cy="100" r="95" fill="url(#alexBg)" opacity="0.9"/>

  <!-- 火焰光晕 -->
  <ellipse cx="100" cy="100" rx="85" ry="85" fill="none" stroke="#FF8C00" stroke-width="2" opacity="0.3"/>
  <ellipse cx="100" cy="100" rx="75" ry="75" fill="none" stroke="#FF6B00" stroke-width="1.5" opacity="0.2"/>

  <!-- 头顶火焰冠 -->
  <g opacity="0.9">
    <path d="M100,12 Q108,40 100,48 Q92,40 100,12" fill="url(#alexFlame)">
      <animate attributeName="d" dur="1.5s" repeatCount="indefinite"
        values="M100,12 Q108,40 100,48 Q92,40 100,12;
                M100,10 Q112,38 100,50 Q88,38 100,10;
                M100,12 Q108,40 100,48 Q92,40 100,12"/>
    </path>
    <path d="M85,20 Q92,48 85,55 Q78,48 85,20" fill="#FF8C00" opacity="0.8">
      <animate attributeName="d" dur="1.8s" repeatCount="indefinite"
        values="M85,20 Q92,48 85,55 Q78,48 85,20;
                M85,18 Q95,46 85,58 Q75,46 85,18;
                M85,20 Q92,48 85,55 Q78,48 85,20"/>
    </path>
    <path d="M115,20 Q108,48 115,55 Q122,48 115,20" fill="#FF8C00" opacity="0.8">
      <animate attributeName="d" dur="1.3s" repeatCount="indefinite"
        values="M115,20 Q108,48 115,55 Q122,48 115,20;
                M115,18 Q105,46 115,58 Q125,46 115,18;
                M115,20 Q108,48 115,55 Q122,48 115,20"/>
    </path>
  </g>

  <!-- 脸部轮廓 — 硬朗线条 -->
  <path d="M100,55 C130,55 148,72 148,95 C148,120 135,140 100,145 C65,140 52,120 52,95 C52,72 70,55 100,55Z" fill="#FF6347" stroke="#CC3333" stroke-width="2"/>

  <!-- 眉毛 — 坚定上扬 -->
  <line x1="70" y1="78" x2="90" y2="74" stroke="#8B0000" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="130" y1="74" x2="110" y2="78" stroke="#8B0000" stroke-width="3.5" stroke-linecap="round"/>

  <!-- 眼睛 — 坚定有神 -->
  <ellipse cx="80" cy="88" rx="10" ry="11" fill="white"/>
  <ellipse cx="120" cy="88" rx="10" ry="11" fill="white"/>
  <circle cx="80" cy="88" r="6" fill="url(#alexEye)" filter="url(#alexGlow)"/>
  <circle cx="120" cy="88" r="6" fill="url(#alexEye)" filter="url(#alexGlow)"/>
  <circle cx="78" cy="86" r="2" fill="white"/>
  <circle cx="118" cy="86" r="2" fill="white"/>

  <!-- 嘴 — 自信微笑 -->
  <path d="M85,112 Q100,122 115,112" fill="none" stroke="#8B0000" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 脸颊红晕 -->
  <ellipse cx="65" cy="100" rx="8" ry="4" fill="#FF6B6B" opacity="0.3"/>
  <ellipse cx="135" cy="100" rx="8" ry="4" fill="#FF6B6B" opacity="0.3"/>

  <!-- 头部装饰线条 -->
  <path d="M60,65 Q55,80 60,95" fill="none" stroke="#FF8C00" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M140,65 Q145,80 140,95" fill="none" stroke="#FF8C00" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
</svg>
