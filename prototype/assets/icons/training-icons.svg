<!-- PrimeAtlas 训练图标集 -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <defs>
    <!-- 深蹲 -->
    <symbol id="icon-squat" viewBox="0 0 24 24">
      <circle cx="12" cy="5" r="2.5" stroke="currentColor" stroke-width="2" fill="none"/>
      <path d="M12 7.5v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M8 14l4 3 4-3" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M8 17l4 2 4-2" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <!-- 卧推 -->
    <symbol id="icon-benchpress" viewBox="0 0 24 24">
      <circle cx="12" cy="7" r="2" stroke="currentColor" stroke-width="2" fill="none"/>
      <line x1="12" y1="9" x2="12" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M4 15h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="8" y1="15" x2="8" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="16" y1="15" x2="16" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M8 10V8a4 4 0 018 0v2" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
    </symbol>

    <!-- 硬拉 -->
    <symbol id="icon-deadlift" viewBox="0 0 24 24">
      <circle cx="12" cy="5" r="2.5" stroke="currentColor" stroke-width="2" fill="none"/>
      <path d="M12 7.5v10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M8 10l-3-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M16 10l3-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M6 17.5h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <rect x="7" y="17.5" width="10" height="2" rx="1" fill="currentColor"/>
    </symbol>

    <!-- 热身 -->
    <symbol id="icon-warmup" viewBox="0 0 24 24">
      <path d="M8 20C8 14 10 10 12 8c2 2 4 6 4 12" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M12 8V4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M8 4l4-1 4 1" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <!-- 拉伸 -->
    <symbol id="icon-stretch" viewBox="0 0 24 24">
      <path d="M8 20V10a4 4 0 118 0v10" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M8 14H4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M16 14h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <circle cx="12" cy="6" r="2" stroke="currentColor" stroke-width="2" fill="none"/>
    </symbol>

    <!-- 组间休息 -->
    <symbol id="icon-rest" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" fill="none"/>
      <polyline points="12,6 12,12 16,14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <!-- PR -->
    <symbol id="icon-pr" viewBox="0 0 24 24">
      <path d="M7 21l3-10-3-3" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M7 8h8a3 3 0 013 3v3" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
      <circle cx="17" cy="19" r="2" stroke="currentColor" stroke-width="2" fill="none"/>
      <path d="M12 5l-1-2h2l-1 2z" fill="currentColor"/>
    </symbol>
  </defs>
</svg>
