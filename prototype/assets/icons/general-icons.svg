<!-- PrimeAtlas 英语/读书/状态/通用图标集 -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <defs>
    <!-- ===== 英语图标 ===== -->

    <!-- 对话 -->
    <symbol id="icon-dialogue" viewBox="0 0 24 24">
      <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <!-- 跟读 -->
    <symbol id="icon-repeat" viewBox="0 0 24 24">
      <path d="M4 4v5h5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M20 20v-5h-5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M4 9a8 8 0 0114-2" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M20 15a8 8 0 01-14 2" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
    </symbol>

    <!-- 发音 -->
    <symbol id="icon-pronounce" viewBox="0 0 24 24">
      <path d="M11 5L6 9H2v6h4l5 4V5z" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M15.54 8.46a5 5 0 010 7.07" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M19.07 4.93a10 10 0 010 14.14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
    </symbol>

    <!-- ===== 读书图标 ===== -->

    <!-- 书架 -->
    <symbol id="icon-bookshelf" viewBox="0 0 24 24">
      <rect x="3" y="3" width="8" height="18" rx="1" stroke="currentColor" stroke-width="2" fill="none"/>
      <rect x="13" y="3" width="8" height="18" rx="1" stroke="currentColor" stroke-width="2" fill="none"/>
      <line x1="7" y1="8" x2="7" y2="16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="17" y1="8" x2="17" y2="16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- 阅读 -->
    <symbol id="icon-reading" viewBox="0 0 24 24">
      <path d="M4 19.5A2.5 2.5 0 016.5 17H20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
      <line x1="8" y1="7" x2="16" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="8" y1="11" x2="16" y2="11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- Agent对话 -->
    <symbol id="icon-agent" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" fill="none"/>
      <path d="M9 10h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M15 10h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M9.5 15a3.5 3.5 0 005 0" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
    </symbol>

    <!-- 笔记 -->
    <symbol id="icon-note" viewBox="0 0 24 24">
      <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="14,2 14,8 20,8" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="8" y1="13" x2="16" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="8" y1="17" x2="12" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- ===== 状态图标 ===== -->

    <!-- 已完成 -->
    <symbol id="icon-done" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" fill="none"/>
      <polyline points="8,12 11,15 16,9" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <!-- 待完成 -->
    <symbol id="icon-pending" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" fill="none"/>
      <polyline points="12,6 12,12 16,14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <!-- 已过期 -->
    <symbol id="icon-expired" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" fill="none"/>
      <line x1="12" y1="8" x2="12" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="12" y1="16" x2="12.01" y2="16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- 需跟进 -->
    <symbol id="icon-follow" viewBox="0 0 24 24">
      <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="12" y1="9" x2="12" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="12" y1="17" x2="12.01" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- ===== 通用图标 ===== -->

    <!-- 设置 -->
    <symbol id="icon-settings" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" fill="none"/>
      <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="2" fill="none"/>
    </symbol>

    <!-- 通知 -->
    <symbol id="icon-notification" viewBox="0 0 24 24">
      <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M13.73 21a2 2 0 01-3.46 0" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
    </symbol>

    <!-- 分享 -->
    <symbol id="icon-share" viewBox="0 0 24 24">
      <circle cx="18" cy="5" r="3" stroke="currentColor" stroke-width="2" fill="none"/>
      <circle cx="6" cy="12" r="3" stroke="currentColor" stroke-width="2" fill="none"/>
      <circle cx="18" cy="19" r="3" stroke="currentColor" stroke-width="2" fill="none"/>
      <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- 返回 -->
    <symbol id="icon-back" viewBox="0 0 24 24">
      <polyline points="15,18 9,12 15,6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <!-- 更多 -->
    <symbol id="icon-more" viewBox="0 0 24 24">
      <circle cx="12" cy="5" r="1.5" fill="currentColor"/>
      <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
      <circle cx="12" cy="19" r="1.5" fill="currentColor"/>
    </symbol>

    <!-- 搜索 -->
    <symbol id="icon-search" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" fill="none"/>
      <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- 编辑 -->
    <symbol id="icon-edit" viewBox="0 0 24 24">
      <path d="M17 3a2.828 2.828 0 114 4L7.5 20.5 2 22l1.5-5.5L17 3z" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <!-- 添加 -->
    <symbol id="icon-add" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" fill="none"/>
      <line x1="12" y1="8" x2="12" y2="16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="8" y1="12" x2="16" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- 删除 -->
    <symbol id="icon-delete" viewBox="0 0 24 24">
      <polyline points="3,6 5,6 21,6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <!-- 锁定 -->
    <symbol id="icon-lock" viewBox="0 0 24 24">
      <rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>
      <path d="M7 11V7a5 5 0 0110 0v4" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
    </symbol>

    <!-- 箭头 -->
    <symbol id="icon-chevron-right" viewBox="0 0 24 24">
      <polyline points="9,18 15,12 9,6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="icon-chevron-down" viewBox="0 0 24 24">
      <polyline points="6,9 12,15 18,9" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <!-- 星星 -->
    <symbol id="icon-star" viewBox="0 0 24 24">
      <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="icon-star-filled" viewBox="0 0 24 24">
      <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <!-- 训练 (哑铃) -->
    <symbol id="icon-training" viewBox="0 0 24 24">
      <path d="M6.5 6.5h11v11h-11z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
      <line x1="6.5" y1="6.5" x2="3" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="17.5" y1="6.5" x2="21" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="6.5" y1="17.5" x2="3" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="17.5" y1="17.5" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- 英语 -->
    <symbol id="icon-english" viewBox="0 0 24 24">
      <path d="M4 4h16a2 2 0 012 2v12a2 2 0 01-2 2H4a2 2 0 01-2-2V6a2 2 0 012-2z" stroke="currentColor" stroke-width="2" fill="none"/>
      <path d="M8 10h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M8 14h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>
  </defs>
</svg>
