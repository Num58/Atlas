<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PrimeAtlas — 英语模块</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .eng-scenario-card {
      background: var(--color-bg-card);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      margin: 0 var(--space-lg) var(--space-md);
      border: 1px solid rgba(255, 255, 255, 0.06);
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    .eng-scenario-card:active {
      transform: scale(0.98);
    }
    .eng-scenario-header {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      margin-bottom: var(--space-sm);
    }
    .eng-scenario-icon {
      font-size: 28px;
    }
    .eng-scenario-title {
      font-size: var(--font-size-body);
      font-weight: var(--font-weight-semibold);
    }
    .eng-scenario-desc {
      font-size: var(--font-size-caption);
      color: var(--color-text-secondary);
    }
    .eng-scenario-meta {
      display: flex;
      gap: var(--space-md);
      margin-top: var(--space-sm);
      font-size: var(--font-size-caption);
      color: var(--color-text-muted);
    }
    .eng-level-badge {
      display: inline-block;
      padding: 2px var(--space-sm);
      border-radius: var(--radius-full);
      font-size: 10px;
      background: rgba(92, 197, 255, 0.15);
      color: var(--color-info);
    }
    .eng-daily-card {
      background: linear-gradient(135deg, rgba(92, 197, 255, 0.08), var(--color-bg-card));
      border: 1px solid rgba(92, 197, 255, 0.15);
      border-radius: var(--radius-lg);
      padding: var(--space-xl);
      margin: 0 var(--space-lg) var(--space-lg);
    }
    .eng-streak {
      display: flex;
      gap: var(--space-sm);
      margin-top: var(--space-sm);
    }
    .eng-streak-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--color-bg-input);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }
    .eng-streak-dot.done {
      background: rgba(0, 229, 160, 0.2);
      color: var(--color-accent);
    }
    .eng-streak-dot.today {
      background: rgba(92, 197, 255, 0.3);
      color: var(--color-info);
      border: 2px solid var(--color-info);
    }
    .eng-chat-preview {
      background: var(--color-bg-elevated);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      margin-top: var(--space-md);
    }
    .eng-chat-line {
      display: flex;
      gap: var(--space-sm);
      margin-bottom: var(--space-sm);
      align-items: flex-start;
    }
    .eng-chat-line.me {
      justify-content: flex-end;
    }
    .eng-chat-bubble {
      max-width: 75%;
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--radius-md);
      font-size: var(--font-size-caption);
      line-height: 1.5;
    }
    .eng-chat-bubble.bot {
      background: rgba(124, 92, 252, 0.15);
      color: var(--color-text);
      border-top-left-radius: var(--radius-sm);
    }
    .eng-chat-bubble.me {
      background: var(--color-primary);
      color: var(--color-text);
      border-top-right-radius: var(--radius-sm);
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="page-content">

    <!-- 模块切换器 -->
    <div class="module-switcher">
      <button class="module-switch-chip" onclick="location.href='module-training.html'">🏋️ 训练</button>
      <button class="module-switch-chip active">🗣️ 英语</button>
      <button class="module-switch-chip" onclick="location.href='module-reading.html'">📚 读书</button>
    </div>

    <!-- 每日打卡 -->
    <div class="eng-daily-card">
      <div class="flex-between mb-md">
        <span style="font-weight: var(--font-weight-bold);">今日口语练习</span>
        <span class="eng-level-badge">中级 B1</span>
      </div>
      <div style="font-size: var(--font-size-caption); color: var(--color-text-secondary); margin-bottom: var(--space-md);">
        已坚持 7 天
      </div>
      <div class="eng-streak">
        <span class="eng-streak-dot done">✓</span>
        <span class="eng-streak-dot done">✓</span>
        <span class="eng-streak-dot done">✓</span>
        <span class="eng-streak-dot done">✓</span>
        <span class="eng-streak-dot done">✓</span>
        <span class="eng-streak-dot done">✓</span>
        <span class="eng-streak-dot today">今</span>
      </div>
      <button class="btn btn-primary btn-block mt-lg">开始今日练习</button>
    </div>

    <!-- 场景对话 -->
    <div style="padding: 0 var(--space-lg); margin-bottom: var(--space-sm);">
      <div class="flex-between">
        <span style="font-weight: var(--font-weight-semibold);">场景对话</span>
        <span style="font-size: var(--font-size-caption); color: var(--color-text-muted);">共12个场景</span>
      </div>
    </div>

    <div class="eng-scenario-card">
      <div class="eng-scenario-header">
        <span class="eng-scenario-icon">☕</span>
        <div>
          <div class="eng-scenario-title">咖啡店点单</div>
          <div class="eng-scenario-desc">学习用英语点咖啡和小食</div>
        </div>
      </div>
      <div class="eng-scenario-meta">
        <span>⏱️ 3分钟</span>
        <span>💬 8轮对话</span>
        <span class="eng-level-badge">入门</span>
      </div>
    </div>

    <div class="eng-scenario-card">
      <div class="eng-scenario-header">
        <span class="eng-scenario-icon">🏨</span>
        <div>
          <div class="eng-scenario-title">酒店入住</div>
          <div class="eng-scenario-desc">办理入住、询问设施</div>
        </div>
      </div>
      <div class="eng-scenario-meta">
        <span>⏱️ 5分钟</span>
        <span>💬 12轮对话</span>
        <span class="eng-level-badge">中级</span>
      </div>
    </div>

    <div class="eng-scenario-card">
      <div class="eng-scenario-header">
        <span class="eng-scenario-icon">🏋️</span>
        <div>
          <div class="eng-scenario-title">健身房交流</div>
          <div class="eng-scenario-desc">和外国教练/健友沟通</div>
        </div>
      </div>
      <div class="eng-scenario-meta">
        <span>⏱️ 4分钟</span>
        <span>💬 10轮对话</span>
        <span class="eng-level-badge">中级</span>
      </div>
    </div>

    <!-- 跟读练习 -->
    <div style="padding: 0 var(--space-lg); margin: var(--space-xl) 0 var(--space-sm);">
      <div class="flex-between">
        <span style="font-weight: var(--font-weight-semibold);">跟读练习</span>
        <span style="font-size: var(--font-size-caption); color: var(--color-text-muted);">发音校准</span>
      </div>
    </div>

    <div class="eng-scenario-card" style="margin-bottom: var(--space-lg);">
      <div class="eng-scenario-header">
        <span class="eng-scenario-icon">🎯</span>
        <div>
          <div class="eng-scenario-title">每日一句</div>
          <div class="eng-scenario-desc">"Consistency is what transforms average into excellence."</div>
        </div>
      </div>
      <div class="eng-chat-preview">
        <div class="eng-chat-line">
          <div class="eng-chat-bubble bot">
            Listen and repeat after me...
          </div>
        </div>
        <div style="display: flex; gap: var(--space-sm); margin-top: var(--space-md);">
          <button class="btn btn-secondary btn-sm">🔊 播放</button>
          <button class="btn btn-primary btn-sm">🎤 跟读</button>
        </div>
      </div>
    </div>

  </div>

  <!-- 底部Tab导航 -->
  <nav class="tab-bar">
    <a href="home.html" class="tab-item">
      <span class="tab-icon">🏠</span>
      <span class="tab-label">首页</span>
    </a>
    <a href="module-english.html" class="tab-item active">
      <span class="tab-icon">📦</span>
      <span class="tab-label">模块</span>
    </a>
    <a href="profile.html" class="tab-item">
      <span class="tab-icon">👤</span>
      <span class="tab-label">我的</span>
    </a>
  </nav>
</div>
</body>
</html>
