<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PrimeAtlas — 原型导航</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .nav-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-md);
      padding: var(--space-lg);
    }
    .nav-card {
      background: var(--color-bg-card);
      border-radius: var(--radius-lg);
      padding: var(--space-xl);
      border: 1px solid rgba(255, 255, 255, 0.06);
      cursor: pointer;
      transition: all var(--transition-fast);
      text-decoration: none;
      color: var(--color-text);
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
      min-height: 120px;
    }
    .nav-card:hover {
      border-color: var(--color-primary);
      box-shadow: var(--shadow-glow);
    }
    .nav-card-icon {
      font-size: 32px;
    }
    .nav-card-title {
      font-size: var(--font-size-body-lg);
      font-weight: var(--font-weight-semibold);
    }
    .nav-card-desc {
      font-size: var(--font-size-caption);
      color: var(--color-text-secondary);
      line-height: 1.4;
    }
    .nav-card.priority {
      border-color: var(--color-primary);
      background: linear-gradient(135deg, rgba(124, 92, 252, 0.1), var(--color-bg-card));
    }
    .section-title {
      font-size: var(--font-size-subtitle);
      font-weight: var(--font-weight-bold);
      padding: var(--space-lg);
      padding-bottom: 0;
    }
    .badge-priority {
      display: inline-block;
      padding: 2px 8px;
      border-radius: var(--radius-full);
      font-size: 10px;
      font-weight: var(--font-weight-bold);
      background: rgba(124, 92, 252, 0.2);
      color: var(--color-primary-light);
      align-self: flex-start;
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="page-content">
    <div style="text-align:center; padding: var(--space-3xl) var(--space-lg) var(--space-xl);">
      <div style="font-size:48px; margin-bottom: var(--space-md);">🏋️</div>
      <h1 style="font-size: var(--font-size-headline); font-weight: var(--font-weight-bold); color: var(--color-text);">
        PrimeAtlas
      </h1>
      <p style="font-size: var(--font-size-body); color: var(--color-text-secondary); margin-top: var(--space-sm);">
        智能训练伙伴 · 原型导航
      </p>
    </div>

    <div class="section-title">核心页面</div>
    <div class="nav-grid">
      <a href="home.html" class="nav-card priority">
        <span class="badge-priority">核心</span>
        <span class="nav-card-icon">🏠</span>
        <span class="nav-card-title">首页</span>
        <span class="nav-card-desc">全天时间线 + 模块入口 + 伙伴问候</span>
      </a>

      <a href="module-training.html" class="nav-card priority">
        <span class="badge-priority">核心</span>
        <span class="nav-card-icon">📦</span>
        <span class="nav-card-title">训练模块</span>
        <span class="nav-card-desc">训练计划 + 动作库</span>
      </a>

      <a href="module-english.html" class="nav-card">
        <span class="nav-card-icon">🗣️</span>
        <span class="nav-card-title">英语模块</span>
        <span class="nav-card-desc">对话 + 跟读</span>
      </a>

      <a href="module-reading.html" class="nav-card">
        <span class="nav-card-icon">📚</span>
        <span class="nav-card-title">读书模块</span>
        <span class="nav-card-desc">书架 + Agent对话</span>
      </a>

      <a href="training-session.html" class="nav-card priority">
        <span class="badge-priority">核心</span>
        <span class="nav-card-icon">🏋️</span>
        <span class="nav-card-title">训练执行</span>
        <span class="nav-card-desc">热身→训练→休息→冷却→完成</span>
      </a>

      <a href="profile.html" class="nav-card priority">
        <span class="badge-priority">核心</span>
        <span class="nav-card-icon">👤</span>
        <span class="nav-card-title">个人中心</span>
        <span class="nav-card-desc">数据看板 + 目标 + 身体档案</span>
      </a>
    </div>

    <div class="section-title">辅助页面</div>
    <div class="nav-grid">
      <a href="onboarding.html" class="nav-card">
        <span class="nav-card-icon">🚀</span>
        <span class="nav-card-title">首次启动</span>
        <span class="nav-card-desc">伙伴召唤→目标→场景</span>
      </a>

      <a href="pr-celebration.html" class="nav-card">
        <span class="nav-card-icon">🎉</span>
        <span class="nav-card-title">PR庆祝</span>
        <span class="nav-card-desc">PR达成庆祝</span>
      </a>

      <a href="rest-day.html" class="nav-card">
        <span class="nav-card-icon">😴</span>
        <span class="nav-card-title">休息日</span>
        <span class="nav-card-desc">温馨提醒</span>
      </a>
    </div>

    <div style="padding: var(--space-2xl) var(--space-lg); text-align: center;">
      <p style="font-size: var(--font-size-caption); color: var(--color-text-muted);">
        PrimeAtlas v1.0 Prototype · 暗色模式 #1A1A2E · 375-414px
      </p>
    </div>
  </div>
</div>
</body>
</html>
