<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>🏆 新纪录！— PrimeAtlas</title><link rel="stylesheet" href="shared.css"><style>
  body{background:#000;overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .pr-scene{text-align:center;animation:fadeIn .5s var(--ease-out)}
  .pr-icon{font-size:80px;animation:pulse .8s infinite}
  .pr-title{font-size:40px;font-weight:700;background:linear-gradient(135deg,#FFD700,#FF8C00,#FFD700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:var(--space-lg) 0}
  .pr-exercise{font-size:var(--text-xl);color:var(--text-secondary);margin-bottom:var(--space-xl)}
  .pr-compare{display:flex;justify-content:center;align-items:center;gap:var(--space-xl);margin:var(--space-xl) 0}
  .pr-old,.pr-new{text-align:center}
  .pr-old-val{font-size:var(--text-xl);color:var(--text-tertiary);text-decoration:line-through}
  .pr-arrow{font-size:var(--text-2xl);color:var(--color-gold)}
  .pr-new-val{font-size:48px;font-weight:700;font-family:var(--font-data);color:var(--color-gold)}
  .pr-delta{font-size:var(--text-lg);color:var(--color-success);margin-top:4px}
  .pr-share{display:flex;gap:var(--space-md);margin-top:var(--space-xl)}
  .pr-share .btn{flex:1}
  .pr-close{position:fixed;top:20px;right:20px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.1);border:none;color:#fff;font-size:20px;cursor:pointer}
</style></head><body>
<div class="pr-scene"><div class="pr-icon">🏆</div><div class="pr-title">新纪录！</div><div class="pr-exercise">杠铃深蹲</div>
  <div class="pr-compare"><div class="pr-old"><div style="color:var(--text-tertiary);font-size:var(--text-sm)">之前</div><div class="pr-old-val">90kg × 5</div></div>
    <div class="pr-arrow">→</div><div class="pr-new"><div style="color:var(--text-tertiary);font-size:var(--text-sm)">现在</div><div class="pr-new-val">95kg × 5</div><div class="pr-delta">+5kg (+5.6%)</div></div></div>
  <div class="pr-share"><button class="btn btn-secondary">保存图片</button><button class="btn btn-primary" onclick="window.close()">继续训练</button></div></div>
<button class="pr-close" onclick="window.close()">✕</button>
</body></html>
