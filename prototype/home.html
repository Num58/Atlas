<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>PrimeAtlas</title><link rel="stylesheet" href="shared.css"><style>
  .home{padding:var(--space-lg);padding-bottom:120px}
  .partner-card{display:flex;align-items:center;gap:var(--space-md);padding:var(--space-lg);background:var(--bg-card);border-radius:var(--radius-xl);margin-bottom:var(--space-lg)}
  .partner-face{font-size:40px;width:56px;height:56px;border-radius:50%;background:var(--bg-elevated);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .partner-info{flex:1}
  .partner-greeting{font-size:var(--text-md);color:var(--text-secondary);line-height:1.5}
  .partner-name{font-size:var(--text-sm);color:var(--text-tertiary);margin-top:var(--space-xs)}
  .training-card{background:linear-gradient(135deg,var(--bg-elevated),var(--bg-card));border:1px solid var(--bg-divider);border-radius:var(--radius-xl);padding:var(--space-xl);margin-bottom:var(--space-lg)}
  .training-card-label{font-size:var(--text-xs);color:var(--text-tertiary);text-transform:uppercase;letter-spacing:1px;margin-bottom:var(--space-sm)}
  .training-card-title{font-size:var(--text-xl);font-weight:700;margin-bottom:var(--space-sm)}
  .training-card-meta{font-size:var(--text-sm);color:var(--text-secondary);margin-bottom:var(--space-lg);line-height:1.6}
  .start-btn{width:100%;padding:18px;border-radius:var(--radius-lg);background:var(--color-primary);color:#fff;font-size:var(--text-lg);font-weight:700;border:none;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center}
  .start-btn:active{transform:scale(.98)}
  .quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-md);margin-top:var(--space-lg)}
  .quick-card{background:var(--bg-card);border-radius:var(--radius-lg);padding:var(--space-lg);text-decoration:none;color:var(--text-primary);border:1px solid var(--bg-divider);transition:all .15s}
  .quick-card:active{background:var(--bg-elevated)}
  .quick-card-icon{font-size:28px;margin-bottom:var(--space-sm)}
  .quick-card-title{font-size:var(--text-md);font-weight:600;margin-bottom:2px}
  .quick-card-desc{font-size:var(--text-xs);color:var(--text-tertiary)}
  .flame{display:inline-block;animation:pulse 2s infinite}
</style></head><body><div class="app"><div class="home">
  <div class="partner-card">
    <div class="partner-face">🔥</div>
    <div class="partner-info">
      <div class="partner-greeting">早。今天深蹲日。<br>准备好了吗？</div>
      <div class="partner-name">Alex · 连续训练 <span class="flame">🔥</span> 12 天</div>
    </div>
  </div>
  <div class="training-card">
    <div class="training-card-label">今日训练计划</div>
    <div class="training-card-title">下肢力量 · 弹跳专项</div>
    <div class="training-card-meta">🏋️ 杠铃深蹲 4×5 @80kg<br>🦵 保加利亚分腿蹲 3×8<br>🏀 弹跳训练 3×6<br>⏱ 预计 52 分钟</div>
    <a href="training-session.html" class="start-btn">开始训练</a>
  </div>
  <div class="quick-grid">
    <a href="english-practice.html" class="quick-card"><div class="quick-card-icon">🗣️</div><div class="quick-card-title">英语练习</div><div class="quick-card-desc">口语对话 · 跟读训练</div></a>
    <a href="reading.html" class="quick-card"><div class="quick-card-icon">📚</div><div class="quick-card-title">读书</div><div class="quick-card-desc">《原子习惯》· 继续阅读</div></a>
    <a href="dashboard.html" class="quick-card"><div class="quick-card-icon">📊</div><div class="quick-card-title">数据</div><div class="quick-card-desc">本周容量 +8% · 成长指数 742</div></a>
    <a href="profile.html" class="quick-card"><div class="quick-card-icon">⚙️</div><div class="quick-card-title">设置</div><div class="quick-card-desc">伙伴管理 · 身体档案</div></a>
  </div>
</div>
<div class="tab-bar">
  <a href="home.html" class="tab-item active"><span class="tab-icon">🏠</span>首页</a>
  <a href="training-history.html" class="tab-item"><span class="tab-icon">🏋️</span>训练</a>
  <a href="profile.html" class="tab-item"><span class="tab-icon">👤</span>我的</a>
</div></div></body></html>
