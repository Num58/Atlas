<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>我的 — PrimeAtlas</title><link rel="stylesheet" href="shared.css"><style>
  .prof{padding:var(--space-lg);padding-bottom:120px}
  .prof-header{display:flex;align-items:center;gap:var(--space-md);margin-bottom:var(--space-xl)}
  .prof-avatar{font-size:48px;width:64px;height:64px;border-radius:50%;background:var(--bg-elevated);display:flex;align-items:center;justify-content:center}
  .prof-name{font-size:var(--text-lg);font-weight:700}
  .prof-level{font-size:var(--text-sm);color:var(--text-tertiary)}
  .menu-group{margin-bottom:var(--space-xl)}
  .menu-title{font-size:var(--text-xs);color:var(--text-tertiary);text-transform:uppercase;letter-spacing:1px;margin-bottom:var(--space-sm);padding:0 var(--space-sm)}
  .menu-item{display:flex;align-items:center;justify-content:space-between;padding:14px var(--space-md);background:var(--bg-card);border-radius:var(--radius-md);margin-bottom:2px;cursor:pointer;text-decoration:none;color:var(--text-primary)}
  .menu-item:active{background:var(--bg-elevated)}
  .menu-left{display:flex;align-items:center;gap:var(--space-md)}
  .menu-icon{font-size:20px}
  .menu-arrow{color:var(--text-tertiary)}
  .toggle{width:48px;height:28px;border-radius:14px;background:var(--bg-divider);position:relative;cursor:pointer;transition:background .2s}
  .toggle.on{background:var(--color-primary)}
  .toggle::after{content:'';position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:left .2s}
  .toggle.on::after{left:23px}
