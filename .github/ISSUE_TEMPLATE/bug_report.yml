name: "🐛 Bug Report"
description: "报告一个 Bug"
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: "复现步骤"
      description: "详细描述如何复现该 Bug"
    validations:
      required: true
  - type: textarea
    attributes:
      label: "实际结果"
    validations:
      required: true
  - type: textarea
    attributes:
      label: "期望结果"
    validations:
      required: true
  - type: input
    attributes:
      label: "环境信息"
      description: "设备型号、操作系统版本、App 版本"
  - type: textarea
    attributes:
      label: "影响范围"
      description: "Bug 对用户体验的影响程度"
  - type: textarea
    attributes:
      label: "截图/日志"
