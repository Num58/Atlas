name: "✨ Feature Request"
description: "提出一个新功能需求"
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    attributes:
      label: "功能描述"
    validations:
      required: true
  - type: textarea
    attributes:
      label: "用户故事"
      description: "As a... I want... So that..."
  - type: textarea
    attributes:
      label: "验收标准"
  - type: dropdown
    attributes:
      label: "优先级"
      options: ["P0 - 核心价值", "P1 - 重要", "P2 - 锦上添花"]
