function renderF09(){const r=state.r2.rpe;return`${screenHead('F09','体能训练执行','计划动作、组次、安全状态、动作教学、显式完成与 RPE 缺失值在同一执行闭环。')}<div class="exercise"><div class="exercise-head"><div><h3>高翻</h3><div class="row-meta">爆发力 · 计划 v6.2</div></div><span class="set-chip">4组 × 3次</span></div><div class="state-banner success">${icon('shield')}<div><strong>安全状态：可执行</strong><p>维持当前负荷；动作质量下降时停止。</p></div></div><h4>动作教学：第二拉与接杠</h4><div class="frame-strip"><div class="keyframe">关键帧1<br>髋膝同步伸展</div><div class="keyframe">关键帧2<br>杠贴近身体上行</div><div class="keyframe">关键帧3<br>主动下沉接杠</div></div><ol class="steps"><li>脚掌稳定，杠铃贴近小腿起始。</li><li>越过膝盖后加速伸髋，不提前屈肘。</li><li>快速下沉，以前架位置接杠并稳定站起。</li></ol></div><div class="exercise"><div class="exercise-head"><div><h3>分腿蹲</h3><div class="row-meta">单侧力量与膝稳定控制</div></div><span class="set-chip">3组 × 8次 / 每侧</span></div></div><div class="exercise"><div class="exercise-head"><div><h3>箱跳</h3><div class="row-meta">仅在右膝无急性疼痛且复评通过时执行</div></div><span class="set-chip">SAFETY</span></div>${banner('warning','当前安全状态：需复核','发现急性疼痛时进入安全否决，不可继续原动作。','shield')}${button('查看安全否决夹具','open-safety')}</div><h2 class="section-title">显式完成与主观强度</h2>${state.r2.exerciseCompleted?banner('success','训练动作已显式完成','RPE 可以记录，也可以跳过并保存 missing。','check'):button('标记训练动作完成','complete-exercise','primary')}<div class="field"><label>选择 RPE</label><div class="rpe-grid">${[5,6,7,8,9].map(value=>`<button data-rpe="${value}" aria-pressed="${r.value===value}">${value}</button>`).join('')}</div><small>未选择不等于0。</small></div><div class="button-row">${button('保存 RPE','save-rpe','primary')}${button('跳过 RPE','skip-rpe')}</div>${r.status==='recorded'?banner('success','RPE 已保存',`本次记录为 ${r.value}。`,'check'):r.status==='missing'?banner('info','RPE 已保存为 missing','value = null；不会被当作0参与任何计算。','database'):''}`}

function renderF11(){const k=state.r2.knowledgeSource,revoked=state.r2.consentStatus==='revoked';return`${screenHead('F11','知识来源与 Consent 治理','这里管理来源、导入、Consent、保留与删除；不重复进行计划适用性评估。')}<div class="adaptive-detail"><div class="list-pane"><div class="row-list"><div class="data-row"><div class="row-main"><strong>${k.title}</strong><div class="row-meta">KnowledgeSource ${k.id} · ${k.origin}</div></div><span class="status-text">${revoked?'REVOKED':'ACTIVE'}</span></div></div></div><div class="detail-pane"><h2>${k.id}</h2><dl class="consent-grid"><dt>导入记录</dt><dd>${k.importedAt}</dd><dt>目的</dt><dd>${k.consent.purpose}</dd><dt>接收方</dt><dd>${k.consent.recipient}</dd><dt>字段</dt><dd>${k.consent.fields}</dd><dt>保留</dt><dd>${k.consent.retention}</dd></dl>${revoked?banner('danger','Consent 已撤回','这是持久页面状态。该来源不再参与新评估；既有计划不会被静默重写。','shield'):banner('info','Consent 有效','撤回后会保留可见状态与后续处理说明。','info')}<div class="button-row">${button('撤回 Consent','revoke-consent','danger')}${button('返回业务入口','open-knowledge')}</div></div></div>`}

function bindDynamic(){$$('[data-action]').forEach(button=>button.addEventListener('click',handleAction));$$('[data-nav]').forEach(button=>button.addEventListener('click',()=>handleNav(button.dataset.nav)));$$('[data-fitness-tab]').forEach(button=>button.addEventListener('click',()=>{state.r2.fitnessTab=button.dataset.fitnessTab;state.r2.fixture='F07';render()}));$$('[data-rpe]').forEach(button=>button.addEventListener('click',()=>{state.r2.rpe={status:'selected',value:Number(button.dataset.rpe)};render()}));const current=$('#currentIdentity'),target=$('#targetIdentity'),edit=$('#draftEdit');if(current)current.addEventListener('input',event=>{state.r0.current=event.target.value});if(target)target.addEventListener('input',event=>{state.r0.target=event.target.value});if(edit)edit.addEventListener('input',event=>{state.r0.target=event.target.value})}

function handleAction(event){const action=event.currentTarget.dataset.action;const go=id=>setFixture(id);switch(action){case'r0-next':go(state.r0.fixture==='A01'?'A02':'A03');break;case'r0-back':go('A02');break;case'confirm-identity':state.r0.confirmed=true;render();announce('身份草案已显式确认');break;case'skip-question':go('A03');break;case'later':announce('草案保留在当前模式；没有创建正式画像');break;case'fourth-domain':state.r1.fourthSuggested=true;render();break;case'open-milestone':case'go-a05':go('A05');break;case'go-a04':go('A04');break;case'confirm-milestone':state.r1.milestoneConfirmed=true;state.r1.fixture='A06';render();break;case'restore-version':state.r1.profileVersion='v4-restored';announce('已从 v2 创建新的 active 版本');render();break;case'direct-action':go('F09');break;case'open-pulse':go('F04');break;case'complete-pulse':state.r2.pulseCompleted=true;render();break;case'open-conflict':go('F02');break;case'adopt-conflict':state.r2.conflictDecision='adopted';render();break;case'self-arrange':state.r2.conflictDecision='self';render();break;case'safe-alternative':state.r2.safetyDecision='alternative';render();break;case'defer-safety':state.r2.safetyDecision='deferred';render();break;case'reassess-safety':state.r2.safetyDecision='reassess';render();break;case'open-safety':go('F03');break;case'open-candidate':$('#portraitCandidate')?.scrollIntoView({block:'center'});announce('画像候选仍待接受或拒绝');break;case'accept-candidate':state.r2.candidateDecision='accepted';render();break;case'reject-candidate':state.r2.candidateDecision='rejected';render();break;case'open-fitness':go('F07');break;case'open-twin':go('F08');break;case'open-training':go('F09');break;case'open-knowledge':go('F10');break;case'open-governance':go('F11');break;case'complete-exercise':state.r2.exerciseCompleted=true;render();break;case'save-rpe':if(state.r2.rpe.value===null){announce('请先选择 RPE，或使用跳过保存 missing');return}state.r2.rpe.status='recorded';render();break;case'skip-rpe':state.r2.rpe={status:'missing',value:null};render();break;case'knowledge-adopt':state.r2.knowledgeDecision='adopt';render();break;case'knowledge-adapt':state.r2.knowledgeDecision='adapt';render();break;case'knowledge-defer':state.r2.knowledgeDecision='defer';render();break;case'knowledge-reject':state.r2.knowledgeDecision='reject';render();break;case'revoke-consent':state.r2.consentStatus='revoked';render();announce('Consent 已撤回并保持为页面状态');break}}
$$('[data-mode]').forEach(button=>button.addEventListener('click',()=>switchMode(button.dataset.mode)));$$('[data-viewport]').forEach(button=>button.addEventListener('click',()=>applyViewport(button.dataset.viewport)));$('#fixtureSelect').addEventListener('change',event=>setFixture(event.target.value));$('#resetBtn').addEventListener('click',resetCurrentMode);$('#textScaleBtn').addEventListener('click',toggleTextScale);
applyViewport(390);render();
